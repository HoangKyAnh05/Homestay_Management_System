spring.application.name=homestayManagement
server.port=8080
# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3307/homestayManagement?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=HomeStayManagementJwtSecretKeyForDevelopmentOnlyChangeInProduction2026
app.jwt.expiration-ms=86400000
